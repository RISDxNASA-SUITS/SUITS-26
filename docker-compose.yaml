# AIA (EVA API) + Ollama only. Run TSS + Java on the host (see RUN_TSS_JAVA_NO_DOCKER.md).
#
#   docker compose -f docker-compose.yaml up -d --build
#
# Host Java must be listening before eva-backend starts, e.g.:
#   cd JavaBackend && JAVA_HTTP_PORT=7071 TSS_HOST=127.0.0.1 TSS_UDP_PORT=14141 mvn exec:java
#
# If Java uses a port other than 7070:
#   EVA_JAVA_BACKEND_URL=http://host.docker.internal:7071 docker compose -f docker-compose.yaml up -d --build
#
# Full stack (TSS + Java + Python nav in Docker): docker-compose.full-stack.yaml

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.2"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  eva-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      EVA_JAVA_BACKEND_URL: ${EVA_JAVA_BACKEND_URL:-http://host.docker.internal:7070}
      EVA_JAVA_TELEMETRY_TRANSPORT: websocket
      EVA_LIVE_TELEMETRY: "true"
      EVA_DEMO_MODE: "false"
      EVA_CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173","http://localhost:8000"]'
      EVA_ASR_ENABLED: "true"
      EVA_AGENTIC_ENABLED: "true"
      EVA_OLLAMA_BASE_URL: http://ollama:11434
      EVA_OLLAMA_MODEL: llama3.2
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

volumes:
  ollama_data:
